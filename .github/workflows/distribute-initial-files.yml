name: distribute-initial-files

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Target repository name"
        required: true
        type: string

jobs:
  distribute:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout organization-structure
        uses: actions/checkout@v6
        with:
          path: source

      - name: Checkout target repository
        uses: actions/checkout@v6
        with:
          repository: bright-room/${{ inputs.target_repo }}
          token: ${{ secrets.AUTH_TOKEN }}
          path: target

      - name: Distribute initial files
        id: distribute
        env:
          TARGET_REPO_DIR: ${{ github.workspace }}/target
          TEMPLATES_DIR: ${{ github.workspace }}/source/.github/templates
        run: bash source/.github/scripts/distribute-initial-files.sh

      - name: Create Pull Request
        if: steps.distribute.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.AUTH_TOKEN }}
          path: target
          commit-message: "Add initial configuration files"
          title: "Add initial configuration files"
          body: |
            ## Summary
            ${{ steps.distribute.outputs.summary }}
            🤖 Generated by [distribute-initial-files](https://github.com/bright-room/organization-structure/actions/workflows/distribute-initial-files.yml)
          branch: add-initial-files
          sign-commits: true
