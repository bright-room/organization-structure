name: on-merge

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/**'

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.7
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init -lockfile=readonly

      - name: Terraform apply
        id: apply
        env:
          GITHUB_TOKEN: ${{ secrets.AUTH_TOKEN }}
        run: terraform apply -no-color -auto-approve

      - name: Detect new repositories
        id: detect
        run: |
          repos=$(echo '${{ steps.apply.outputs.stdout }}' \
            | grep -oP 'module\.repository_\K[^.]+(?=\.github_repository\.this: Creation complete)' \
            | sed 's/_/-/g' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))' \
            || echo '[]')
          echo "repos=${repos}" >> "$GITHUB_OUTPUT"

      - name: Distribute claude-skills to new repositories
        if: steps.detect.outputs.repos != '[]'
        env:
          GH_TOKEN: ${{ secrets.AUTH_TOKEN }}
        run: |
          for repo in $(echo '${{ steps.detect.outputs.repos }}' | jq -r '.[]'); do
            gh workflow run distribute-claude-skills.yml \
              -f target_repo="${repo}" \
              --repo bright-room/organization-structure
          done
