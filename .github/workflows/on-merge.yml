name: on-merge

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/**'

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: terraform
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.GH_ORGANIZATION_TFSTATE_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.GH_ORGANIZATION_TFSTATE_AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.MINERVA_SAMA_APP_ID }}
          private-key: ${{ secrets.MINERVA_SAMA_APP_PRIVATE_KEY }}
          owner: bright-room

      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.7

      - name: Terraform Init
        run: terraform init -lockfile=readonly

      - name: Terraform apply
        id: apply
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: terraform apply -no-color -auto-approve

      - name: Distribute initial files to new repositories
        env:
          TF_APPLY_OUTPUT: ${{ steps.apply.outputs.stdout }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/trigger-distribute-for-new-repos.sh"
