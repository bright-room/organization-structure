name: distribute-claude-skills

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Target repository name (empty = all repositories)"
        required: false
        type: string
      submodule_path:
        description: "Path to place the submodule"
        required: false
        type: string
        default: ".claude/skills/shared"

env:
  EXCLUDE_REPOS: '["claude-skills", "organization-structure", "prompts"]'

jobs:
  resolve-targets:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      repos: ${{ steps.resolve.outputs.repos }}
    steps:
      - name: Resolve target repositories
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.AUTH_TOKEN }}
        run: |
          exclude='${{ env.EXCLUDE_REPOS }}'
          if [ -n "${{ inputs.target_repo }}" ]; then
            is_excluded=$(echo "${exclude}" | jq -r --arg r "${{ inputs.target_repo }}" 'map(select(. == $r)) | length > 0')
            if [ "${is_excluded}" = "true" ]; then
              echo "::warning::${{ inputs.target_repo }} is in the exclusion list. Skipping."
              echo "repos=[]" >> "$GITHUB_OUTPUT"
            else
              echo "repos=[\"${{ inputs.target_repo }}\"]" >> "$GITHUB_OUTPUT"
            fi
          else
            repos=$(gh repo list bright-room --json name --limit 100 | jq -c --argjson exclude "${exclude}" '[.[].name] | map(select(. as $n | $exclude | index($n) | not))')
            echo "repos=${repos}" >> "$GITHUB_OUTPUT"
          fi

  distribute:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: resolve-targets
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.resolve-targets.outputs.repos) }}
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v6
        with:
          repository: bright-room/${{ matrix.repo }}
          token: ${{ secrets.AUTH_TOKEN }}

      - name: Check if submodule already exists
        id: check
        run: |
          if [ -f .gitmodules ] && grep -q "claude-skills" .gitmodules; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Add submodule
        if: steps.check.outputs.exists == 'false'
        run: |
          git submodule add https://github.com/bright-room/claude-skills.git "${{ inputs.submodule_path }}"

      - name: Create Pull Request
        if: steps.check.outputs.exists == 'false'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.AUTH_TOKEN }}
          commit-message: "Add claude-skills submodule"
          title: "Add shared Claude skills via submodule"
          body: |
            ## Summary
            - Add `claude-skills` as a git submodule at `${{ inputs.submodule_path }}`
            - Shared Claude Code skills for use across bright-room repositories

            🤖 Generated by [distribute-claude-skills](https://github.com/bright-room/organization-structure/actions/workflows/distribute-claude-skills.yml)
          branch: add-claude-skills-submodule
